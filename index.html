<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffe6e6; /* Warna pink lembut */
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
            animation: popUp 0.5s ease-out;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .gif-container {
            margin-bottom: 20px;
        }
        
        .gif-container img {
            width: 150px;
            border-radius: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            height: 50px; /* Space for buttons */
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        #btn-yes {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        #btn-no {
            background: #ddd;
            color: #333;
            position: absolute; /* Supaya bisa dipindah-pindah */
            right: 20px; /* Posisi awal */
        }

        /* Animasi muncul */
        @keyframes popUp {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" autoplay loop>
        <source src="https://haribahagiaaku.com/wp-content/uploads/2022/01/Tulus-Teman-Hidup.mp3" type="audio/mp3">
    </audio>

    <div class="container">
        <!-- Gambar Lucu (Ganti linknya kalau mau) -->
        <div class="gif-container">
            <img src="https://i.ibb.co.com/bRdwXQKz/iyenn.jpg" alt="Cute Gif">
        </div>

        <!-- Pertanyaan -->
        <h1>Hai Iyen, btw Selamat Ulang Tahun Ya! ❤️</h1>
        <p>sebelumnya aku minta maaf dulu, karna aku gak romantis dan gak bisa ungkapkan langsung perasaan ku ke ikm. Mungkin karna aku pemalu dan aku anak IT, jadinya cuma bisa lewat ini aja. <br> Mau Gak Jadi Pacarku?</p>

        <!-- Tombol -->
        <div class="btn-group">
            <button id="btn-yes" onclick="kirimPesan()">Mau 🥰</button>
            <button id="btn-no" onmouseover="pindahTombol()" onclick="pindahTombol()">Enggak 😜</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI NOMOR WA ---
        // Ganti dengan nomor WhatsApp kamu (pakai kode negara 62, tanpa +)
        const nomorWA = "6282254905544"; 

        // Pesan yang akan dikirim otomatis
        const pesanIsi = "Hai Ikyy! Aku mau jadi pacar km 🥰❤️‍🔥, Makasih ya udah bikin hari spesialku jadi lebih Spesial 😘🫶🏻❤️";

        // ---------------------------

        function kirimPesan() {
            const pesanFinal = encodeURIComponent(pesanIsi);
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            const linkMobile = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesanFinal}&app_absent=0`;
            const linkDesktop = `https://web.whatsapp.com/send?phone=${nomorWA}&text=${pesanFinal}`;
            const linkWA = isMobile ? linkMobile : linkDesktop;
            window.location.href = linkWA;
        }

        function pindahTombol() {
            const btnNo = document.getElementById('btn-no');
            
            // Ambil lebar dan tinggi layar (dikurangi margin aman)
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);

            // Ubah posisi tombol jadi 'fixed' biar bisa lari ke mana aja di layar
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>

</body>
</html>
